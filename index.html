<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="description" content="Every Idea Counts - 一个极简的想法捕捉工具" />
    <title>Every Idea Counts</title>
    
    <!-- Google Fonts: Crimson Pro (display) + DM Sans (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    
    <!-- Chinese Fonts: Noto Serif SC + Noto Sans SC -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
      /* ============================================
         CSS Reset & Base Styles
         ============================================ */
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      
      html {
        font-size: 16px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      
      body {
        font-family: 'DM Sans', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 1rem;
        line-height: 1.5;
        color: #18181B;
        background-color: #FAFAFA;
        min-height: 100vh;
        transition: background-color 0.2s ease, color 0.2s ease;
      }
      
      /* Dark mode base */
      body.dark {
        color: #FAFAFA;
        background-color: #0A0A0A;
      }
      
      /* Typography defaults */
      h1, h2, h3, h4, h5, h6 {
        font-family: 'Crimson Pro', 'Noto Serif SC', Georgia, serif;
        font-weight: 600;
        line-height: 1.25;
        letter-spacing: -0.025em;
      }
      
      h1 { font-size: 1.875rem; }
      h2 { font-size: 1.5rem; }
      h3 { font-size: 1.25rem; }
      
      /* Focus styles */
      :focus-visible {
        outline: 2px solid #0D9488;
        outline-offset: 2px;
      }
      
      /* Remove default button styles */
      button {
        font-family: inherit;
        font-size: inherit;
        border: none;
        background: none;
        cursor: pointer;
      }
      
      button:disabled {
        cursor: not-allowed;
      }
      
      /* Form elements */
      input, textarea, select {
        font-family: inherit;
        font-size: inherit;
      }
      
      textarea {
        resize: vertical;
      }
      
      /* Links */
      a {
        color: inherit;
        text-decoration: none;
      }
      
      /* Selection */
      ::selection {
        background-color: #CCFBF1;
        color: #134E4A;
      }
      
      body.dark ::selection {
        background-color: #134E4A;
        color: #5EEAD4;
      }
      
      /* Scrollbar styling */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      
      ::-webkit-scrollbar-thumb {
        background: #D4D4D8;
        border-radius: 4px;
      }
      
      ::-webkit-scrollbar-thumb:hover {
        background: #A1A1AA;
      }
      
      body.dark ::-webkit-scrollbar-thumb {
        background: #3F3F46;
      }
      
      body.dark ::-webkit-scrollbar-thumb:hover {
        background: #52525B;
      }
      
      /* Smooth scrolling */
      @media (prefers-reduced-motion: no-preference) {
        html {
          scroll-behavior: smooth;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
